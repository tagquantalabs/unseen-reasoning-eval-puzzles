<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARC Puzzle Viewer — Quanta Labs</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #e2e2fa;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #6a6a80;
    --accent: #5b8cff;
    --accent-dim: #3a5ab0;
    --green: #2ecc40;
    --red: #ff4136;
    --yellow: #ffdc00;
    --orange: #FF851B;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { padding: 24px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  .header h1 { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .header h1 span { color: var(--accent); }
  .header .tag { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); background: var(--surface2); padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); }

  .container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }
  .input-section { margin-bottom: 24px; }
  .input-controls { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }

  .btn { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; padding: 8px 16px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: all 0.15s; background: var(--surface2); color: var(--text); }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); color: #fff; }
  .file-input { display: none; }

  textarea { width: 100%; height: 140px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 12px; resize: vertical; outline: none; transition: border-color 0.15s; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-dim); }
  .hint { font-size: 11px; color: var(--text-dim); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }
  .error { background: rgba(255,65,54,0.1); border: 1px solid rgba(255,65,54,0.3); color: var(--red); padding: 10px 14px; border-radius: 6px; font-size: 12px; font-family: 'JetBrains Mono', monospace; margin-bottom: 16px; display: none; }

  .puzzle-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 24px; overflow: hidden; }
  .puzzle-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .puzzle-header .puzzle-id { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--accent); }
  .puzzle-header .puzzle-badge { font-size: 10px; color: var(--text-dim); background: var(--surface2); padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; }
  .puzzle-header .puzzle-badge.diff-easy { color: var(--green); border-color: rgba(46,204,64,0.3); }
  .puzzle-header .puzzle-badge.diff-medium { color: var(--orange); border-color: rgba(255,133,27,0.3); }
  .puzzle-header .puzzle-badge.diff-hard { color: var(--red); border-color: rgba(255,65,54,0.3); }
  .puzzle-header .puzzle-stats { font-size: 11px; color: var(--text-dim); margin-left: auto; font-family: 'JetBrains Mono', monospace; }

  .meta-bar { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 20px; align-items: center; flex-wrap: wrap; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
  .meta-bar .meta-val { color: var(--text); }

  /* Collapsible panels */
  .panel { border-bottom: 1px solid var(--border); }
  .panel-toggle { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; transition: background 0.15s; user-select: none; }
  .panel-toggle:hover { background: var(--surface2); }
  .panel-toggle .chev { transition: transform 0.2s; font-size: 12px; }
  .panel-toggle.open .chev { transform: rotate(90deg); }
  .panel-toggle.rules-color { color: var(--accent); }
  .panel-toggle.coverage-color { color: var(--green); }
  .panel-body { display: none; padding: 0 20px 16px 20px; }
  .panel-body.open { display: block; }

  .rules-desc { font-size: 13px; color: var(--text); margin-bottom: 14px; font-weight: 600; }
  .sub-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 8px; margin-top: 14px; }

  .el-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .el-chip { display: flex; align-items: center; gap: 4px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); background: var(--surface2); padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); }
  .el-dot { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }

  .rule-step { font-size: 12px; color: var(--text); line-height: 1.6; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .rule-step:last-child { border-bottom: none; }
  .rule-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); margin-right: 6px; font-weight: 700; }

  .rule-notes { margin-top: 10px; font-size: 11px; color: var(--text-dim); line-height: 1.5; font-style: italic; }

  .cov-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .cov-chip { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--green); background: rgba(46,204,64,0.08); padding: 3px 8px; border-radius: 4px; border: 1px solid rgba(46,204,64,0.2); }

  .pairs-section { padding: 20px; }
  .section-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section-label.train { color: var(--accent); }
  .section-label.test { color: var(--red); }
  .section-label .line { flex: 1; height: 1px; background: var(--border); }

  .pairs-grid { display: flex; flex-wrap: wrap; gap: 24px; margin-bottom: 28px; }
  .pair { display: flex; align-items: flex-start; gap: 12px; }
  .pair-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
  .arrow { display: flex; align-items: center; padding-top: 20px; color: var(--text-dim); font-size: 20px; }

  table.grid { border-collapse: collapse; border: 2px solid var(--border); }
  table.grid td { text-align: center; font-family: 'JetBrains Mono', monospace; font-weight: 600; border: 1px solid rgba(255,255,255,0.06); }

  .legend { display: flex; gap: 4px; flex-wrap: wrap; padding: 12px 20px; border-top: 1px solid var(--border); align-items: center; }
  .legend-label { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1px; margin-right: 8px; }
  .legend-item { display: flex; align-items: center; gap: 3px; margin-right: 8px; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700; }
  .legend-name { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state p { font-size: 13px; font-family: 'JetBrains Mono', monospace; }

  .nav-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .nav-bar .count { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); margin-right: 8px; }
  .nav-btn { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 5px 10px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; background: var(--surface2); color: var(--text-dim); transition: all 0.15s; }
  .nav-btn:hover, .nav-btn.active { border-color: var(--accent); color: var(--accent); }

  .size-controls { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .size-controls label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
  .size-slider { width: 100px; accent-color: var(--accent); }
  .size-value { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); min-width: 30px; }
  .toggle-nums { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; background: var(--surface2); color: var(--text-dim); transition: all 0.15s; }
  .toggle-nums:hover, .toggle-nums.active { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <h1><span>ARC</span> Puzzle Viewer</h1>
  <div class="tag">Quanta Labs</div>
</div>

<div class="container">
  <div class="input-section">
    <div class="input-controls">
      <button class="btn btn-primary" onclick="renderPuzzles()">Render</button>
      <button class="btn" onclick="document.getElementById('fileInput').click()">Load .json file</button>
      <input type="file" id="fileInput" class="file-input" accept=".jsonl,.json,.txt" onchange="loadFile(event)">
      <button class="btn" onclick="clearAll()">Clear</button>
    </div>
    <textarea id="jsonInput" placeholder='Paste a Quanta Labs puzzle JSON here, or load a .json file.&#10;Supports the delivery format (with rules/coverage) or plain ARC format.'></textarea>
    <div class="hint">Accepts single puzzle, array of puzzles, or JSONL. Ctrl+Enter to render.</div>
  </div>
  <div id="error" class="error"></div>
  <div id="output"></div>
</div>

<script>
const ARC_COLORS = {
  0: { bg:'#000000', fg:'#555555', name:'Black',   letter:'' },
  1: { bg:'#0074D9', fg:'#ffffff', name:'Blue',    letter:'a' },
  2: { bg:'#FF4136', fg:'#ffffff', name:'Red',     letter:'b' },
  3: { bg:'#2ECC40', fg:'#000000', name:'Green',   letter:'c' },
  4: { bg:'#FFDC00', fg:'#000000', name:'Yellow',  letter:'d' },
  5: { bg:'#AAAAAA', fg:'#000000', name:'Grey',    letter:'e' },
  6: { bg:'#F012BE', fg:'#ffffff', name:'Magenta', letter:'f' },
  7: { bg:'#FF851B', fg:'#000000', name:'Orange',  letter:'g' },
  8: { bg:'#7FDBFF', fg:'#000000', name:'Azure',   letter:'h' },
  9: { bg:'#870C25', fg:'#ffffff', name:'Maroon',  letter:'i' },
};

let cellSize = 32, showNumbers = true;

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function getColor(v) { return ARC_COLORS[v] || { bg:'#333', fg:'#fff', name:`${v}`, letter:'?' }; }

function parseInput(text) {
  text = text.trim();
  if (!text) throw new Error('No input provided');
  if (text.startsWith('[')) { try { const a = JSON.parse(text); if (Array.isArray(a)) return a; } catch(e) {} }
  if (text.startsWith('{')) { try { return [JSON.parse(text)]; } catch(e) {} }
  const lines = text.split('\n').filter(l => l.trim());
  const puzzles = [];
  for (let i = 0; i < lines.length; i++) {
    const l = lines[i].trim();
    if (!l || l.startsWith('//') || l.startsWith('#')) continue;
    try { puzzles.push(JSON.parse(l)); } catch(e) { throw new Error(`Line ${i+1}: ${e.message}`); }
  }
  if (!puzzles.length) throw new Error('No valid JSON found');
  return puzzles;
}

function renderGrid(grid) {
  const rows = grid.length, cols = Math.max(...grid.map(r => r.length));
  let h = '<table class="grid">';
  for (let r = 0; r < rows; r++) {
    h += '<tr>';
    for (let c = 0; c < cols; c++) {
      const v = (grid[r] && grid[r][c] !== undefined) ? grid[r][c] : 0;
      const cl = getColor(v);
      h += `<td style="width:${cellSize}px;height:${cellSize}px;background:${cl.bg};color:${cl.fg};font-size:${Math.max(8,cellSize*0.38)}px;">`;
      if (showNumbers) h += cl.letter;
      h += '</td>';
    }
    h += '</tr>';
  }
  return h + '</table>';
}

function dims(grid) { return `${grid.length}×${Math.max(...grid.map(r=>r.length))}`; }

function renderPair(pair, i, type) {
  return `<div class="pair">
    <div><div class="pair-label">${type} ${i+1} input <span style="opacity:0.5">${dims(pair.input)}</span></div>${renderGrid(pair.input)}</div>
    <div class="arrow">→</div>
    <div><div class="pair-label">${type} ${i+1} output <span style="opacity:0.5">${dims(pair.output)}</span></div>${renderGrid(pair.output)}</div>
  </div>`;
}

function togglePanel(id) {
  document.getElementById('toggle-'+id).classList.toggle('open');
  document.getElementById('body-'+id).classList.toggle('open');
}

function renderPuzzle(puzzle, idx) {
  const id = puzzle.id || `puzzle-${idx+1}`;
  const nTr = puzzle.train ? puzzle.train.length : 0;
  const nTe = puzzle.test ? puzzle.test.length : 0;
  let h = '<div class="puzzle-card">';

  // Header
  h += '<div class="puzzle-header">';
  h += `<span class="puzzle-id">${esc(id)}</span>`;
  if (puzzle.difficulty) {
    const dc = puzzle.difficulty === 'easy' ? 'diff-easy' : puzzle.difficulty === 'hard' ? 'diff-hard' : 'diff-medium';
    h += `<span class="puzzle-badge ${dc}">${esc(puzzle.difficulty)}</span>`;
  }
  if (puzzle.type) h += `<span class="puzzle-badge">${esc(puzzle.type)}</span>`;
  h += `<span class="puzzle-stats">${nTr} train · ${nTe} test</span>`;
  h += '</div>';

  // Meta bar
  const metas = [];
  if (puzzle.created_at) metas.push(`Created: <span class="meta-val">${esc(puzzle.created_at)}</span>`);
  if (puzzle.difficulty) metas.push(`Difficulty: <span class="meta-val">${esc(puzzle.difficulty)}</span>`);
  if (puzzle.type) metas.push(`Type: <span class="meta-val">${esc(puzzle.type)}</span>`);
  if (metas.length) h += `<div class="meta-bar">${metas.join(' · ')}</div>`;

  // Rules panel
  if (puzzle.rules) {
    const r = puzzle.rules;
    const pid = `rules-${idx}`;
    h += '<div class="panel">';
    h += `<div class="panel-toggle rules-color" id="toggle-${pid}" onclick="togglePanel('${pid}')"><span class="chev">▶</span> Rules</div>`;
    h += `<div class="panel-body" id="body-${pid}">`;
    if (r.description) h += `<div class="rules-desc">${esc(r.description)}</div>`;

    if (r.elements) {
      h += '<div class="sub-label">Elements</div><div class="el-chips">';
      for (const [val, desc] of Object.entries(r.elements)) {
        const cl = getColor(parseInt(val));
        h += `<div class="el-chip"><div class="el-dot" style="background:${cl.bg}"></div>${esc(val)}: ${esc(desc)}</div>`;
      }
      h += '</div>';
    }

    if (r.steps && r.steps.length) {
      h += '<div class="sub-label">Steps</div>';
      r.steps.forEach((s,i) => { h += `<div class="rule-step"><span class="rule-num">${i+1}</span>${esc(s)}</div>`; });
    }

    if (r.notes && r.notes.length) {
      h += '<div class="sub-label">Notes</div><div class="rule-notes">';
      r.notes.forEach(n => { h += `<div style="margin-bottom:4px">· ${esc(n)}</div>`; });
      h += '</div>';
    }

    h += '</div></div>';
  }

  // Coverage panel
  if (puzzle.coverage) {
    const c = puzzle.coverage;
    const pid = `cov-${idx}`;
    h += '<div class="panel">';
    h += `<div class="panel-toggle coverage-color" id="toggle-${pid}" onclick="togglePanel('${pid}')"><span class="chev">▶</span> Coverage</div>`;
    h += `<div class="panel-body" id="body-${pid}">`;
    if (c.train_summary) h += `<div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);margin-bottom:10px">${esc(c.train_summary)}</div>`;
    if (c.features_exercised && c.features_exercised.length) {
      h += '<div class="cov-chips">';
      c.features_exercised.forEach(f => { h += `<div class="cov-chip">✓ ${esc(f)}</div>`; });
      h += '</div>';
    }
    h += '</div></div>';
  }

  // Train pairs
  if (nTr) {
    h += '<div class="pairs-section"><div class="section-label train"><span>Train Examples</span><span class="line"></span></div><div class="pairs-grid">';
    puzzle.train.forEach((p,i) => { h += renderPair(p, i, 'train'); });
    h += '</div></div>';
  }

  // Test pairs
  if (nTe) {
    h += '<div class="pairs-section"><div class="section-label test"><span>Test Examples</span><span class="line"></span></div><div class="pairs-grid">';
    puzzle.test.forEach((p,i) => { h += renderPair(p, i, 'test'); });
    h += '</div></div>';
  }

  // Legend
  h += '<div class="legend"><span class="legend-label">Colors</span>';
  if (puzzle.rules && puzzle.rules.elements) {
    for (const [val, desc] of Object.entries(puzzle.rules.elements)) {
      const cl = getColor(parseInt(val));
      const lbl = cl.letter || '·';
      const short = desc.split('—')[0].split('(')[0].trim();
      h += `<div class="legend-item"><div class="legend-swatch" style="background:${cl.bg};color:${cl.fg}">${lbl}</div><span class="legend-name">${short}</span></div>`;
    }
  } else {
    for (let v = 0; v <= 9; v++) {
      const cl = ARC_COLORS[v]; const lbl = cl.letter || '·';
      h += `<div class="legend-item"><div class="legend-swatch" style="background:${cl.bg};color:${cl.fg}">${lbl}</div><span class="legend-name">${cl.name}</span></div>`;
    }
  }
  h += '</div></div>';
  return h;
}

function renderPuzzles() {
  const errEl = document.getElementById('error'), outEl = document.getElementById('output');
  const text = document.getElementById('jsonInput').value;
  errEl.style.display = 'none';
  try {
    const puzzles = parseInput(text);
    let h = '<div class="nav-bar">';
    h += `<span class="count">${puzzles.length} puzzle${puzzles.length!==1?'s':''}</span>`;
    if (puzzles.length > 1) {
      h += '<button class="nav-btn active" onclick="showAll()">All</button>';
      puzzles.forEach((p,i) => { h += `<button class="nav-btn" onclick="showPuzzle(${i})">${esc(p.id||'#'+(i+1))}</button>`; });
    }
    h += `<div class="size-controls"><label>Cell size</label><input type="range" class="size-slider" min="12" max="64" value="${cellSize}" oninput="updateSize(this.value)"><span class="size-value" id="sizeVal">${cellSize}px</span>`;
    h += `<button class="toggle-nums ${showNumbers?'active':''}" onclick="toggleNumbers()">abc</button></div></div>`;
    h += '<div id="puzzleCards">';
    puzzles.forEach((p,i) => { h += `<div class="puzzle-card-wrap" data-index="${i}">${renderPuzzle(p,i)}</div>`; });
    h += '</div>';
    outEl.innerHTML = h;
  } catch(e) { errEl.textContent = e.message; errEl.style.display = 'block'; outEl.innerHTML = ''; }
}

function showAll() {
  document.querySelectorAll('.puzzle-card-wrap').forEach(el => el.style.display = 'block');
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i===0));
}
function showPuzzle(idx) {
  document.querySelectorAll('.puzzle-card-wrap').forEach((el,i) => el.style.display = i===idx?'block':'none');
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i===idx+1));
}
function updateSize(v) { cellSize=parseInt(v); document.getElementById('sizeVal').textContent=cellSize+'px'; renderPuzzles(); const s=document.querySelector('.size-slider'); if(s) s.value=cellSize; }
function toggleNumbers() { showNumbers=!showNumbers; renderPuzzles(); }
function loadFile(e) { const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=function(ev){document.getElementById('jsonInput').value=ev.target.result;renderPuzzles();}; r.readAsText(f); e.target.value=''; }
function clearAll() { document.getElementById('jsonInput').value=''; document.getElementById('output').innerHTML='<div class="empty-state"><div class="icon">◧</div><p>Paste puzzle JSON or load a .json file</p></div>'; document.getElementById('error').style.display='none'; }

document.getElementById('output').innerHTML='<div class="empty-state"><div class="icon">◧</div><p>Paste puzzle JSON or load a .json file</p></div>';
document.addEventListener('keydown', function(e) { if((e.ctrlKey||e.metaKey)&&e.key==='Enter') renderPuzzles(); });
</script>
</body>
</html>
